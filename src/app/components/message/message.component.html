
<div class="main-container">
  <div class="mt-3">
    @for (data of cardHome; track data) {
      <div class="cards my-3" style="width: 22rem;">
        <img class="card-img-top" [src]="data?.imgUrl" alt="Card image cap">
        <div class="card-body">
          <h5 class="card-title pt-3">{{data?.title}}</h5>
          <p class="card-text pt-2">{{data?.description}}</p>
          <!-- <a href="#" class="btn btn-primary">Go somewhere</a> -->
        </div>
      </div>
    }
  </div>
</div>

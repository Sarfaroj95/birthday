<div class="body-section">
  <div class="cards" style="height: 140px; margin-bottom: 16px;">
    <div class="name">Sarfaroj</div>
    <p>This is my own app</p>
  </div>
  <div class="container">
    @for (row of rows; track row) {
      <div class="row">
        @for (item of row; track item) {
          <div class="cards">
            <i class="fa" [ngClass]="item.icon"></i>
            <div class="name">{{ item.name }}</div>
          </div>
        }
      </div>
    }
  </div>
</div>
